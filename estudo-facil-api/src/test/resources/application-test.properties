spring.application.name=estudo-facil-api-test

spring.datasource.url=jdbc:h2:mem:estudofacil-test;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

jwt.secret=estudofacil-test-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

spring.security.user.name=disabled
spring.security.user.password=disabled
