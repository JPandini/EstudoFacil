# PostgreSQL (produção)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:estudofacil}
spring.datasource.username=${DB_USER:estudofacil}
spring.datasource.password=${DB_PASSWORD:estudofacil}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 Console desabilitado em produção
spring.h2.console.enabled=false
