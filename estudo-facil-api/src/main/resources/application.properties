spring.application.name=estudo-facil-api
spring.profiles.active=dev

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:estudofacil-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Spring Security - desabilita usuario/senha auto-gerado
spring.security.user.name=disabled
spring.security.user.password=disabled
